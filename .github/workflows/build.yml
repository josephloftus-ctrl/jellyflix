name: Build tvOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Select Xcode version
      run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

    - name: Show Xcode version
      run: xcodebuild -version

    - name: List available SDKs
      run: xcodebuild -showsdks

    - name: Resolve Swift packages
      run: |
        xcodebuild -resolvePackageDependencies \
          -project Stingray.xcodeproj \
          -scheme Stingray

    - name: Build Archive (Unsigned)
      run: |
        xcodebuild archive \
          -project Stingray.xcodeproj \
          -scheme Stingray \
          -archivePath build/Jellyflix.xcarchive \
          -sdk appletvos \
          -destination 'generic/platform=tvOS' \
          -configuration Release \
          -skipPackagePluginValidation \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          DEVELOPMENT_TEAM="" \
          PROVISIONING_PROFILE_SPECIFIER="" \
          2>&1 | tee build.log

    - name: Show build errors
      if: failure()
      run: |
        echo "=== BUILD ERRORS ==="
        grep -E "error:|warning:" build.log | head -50 || echo "No errors found in grep"
        echo "=== END ERRORS ==="

    - name: Debug archive structure
      run: |
        echo "=== Full archive tree ==="
        find build/Jellyflix.xcarchive -type d | head -30
        echo "=== All .app bundles ==="
        find build/Jellyflix.xcarchive -name "*.app"

    - name: Create Unsigned IPA
      run: |
        APP_PATH=$(find build/Jellyflix.xcarchive -name "*.app" -not -name "TopShelf*" | head -1)
        echo "Using app: $APP_PATH"
        if [ -z "$APP_PATH" ]; then
          echo "ERROR: No .app found in archive"
          exit 1
        fi
        mkdir -p build/Payload
        cp -r "$APP_PATH" build/Payload/
        cd build
        zip -r Jellyflix-unsigned.ipa Payload
        rm -rf Payload
        ls -lh Jellyflix-unsigned.ipa

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Jellyflix-unsigned-ipa
        path: build/Jellyflix-unsigned.ipa
        retention-days: 30
