name: Build tvOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Select Xcode version
      run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

    - name: Show Xcode version
      run: xcodebuild -version

    - name: Install tvOS platform support
      run: |
        sudo xcodebuild -downloadPlatform tvOS || true
        xcodebuild -showsdks | grep -i tv

    - name: Resolve Swift packages
      run: |
        xcodebuild -resolvePackageDependencies \
          -project Stingray.xcodeproj \
          -scheme Stingray

    - name: Build for tvOS (Unsigned)
      run: |
        xcodebuild build \
          -project Stingray.xcodeproj \
          -scheme Stingray \
          -sdk appletvos \
          -configuration Release \
          -derivedDataPath build/DerivedData \
          -skipPackagePluginValidation \
          ARCHS=arm64 \
          ONLY_ACTIVE_ARCH=NO \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          DEVELOPMENT_TEAM="" \
          PROVISIONING_PROFILE_SPECIFIER="" \
          2>&1 | tee build.log

    - name: Show build errors
      if: failure()
      run: |
        echo "=== BUILD ERRORS ==="
        grep -E "error:|warning:" build.log | head -50 || echo "No errors found in grep"
        echo "=== END ERRORS ==="

    - name: Explore DerivedData
      run: |
        echo "=== All files in Products ==="
        find build/DerivedData/Build/Products -type f | head -50
        echo ""
        echo "=== All .app directories ==="
        find build/DerivedData -name "*.app" -type d
        echo ""
        echo "=== Stingray binary locations ==="
        find build/DerivedData -name "Stingray" -type f
        echo ""
        echo "=== App bundle contents ==="
        APP_PATH=$(find build/DerivedData/Build/Products -name "Stingray.app" -type d | head -1)
        if [ -n "$APP_PATH" ]; then
          ls -laR "$APP_PATH/" | head -40
          du -sh "$APP_PATH"
        fi
        echo ""
        echo "=== IntermediateBuildFilesPath ==="
        find build/DerivedData/Build/Intermediates.noindex -name "Stingray" -type f 2>/dev/null | head -5

    - name: Create Unsigned IPA
      run: |
        APP_PATH=$(find build/DerivedData/Build/Products -name "Stingray.app" -type d | head -1)
        echo "Using app: $APP_PATH"
        echo "App size: $(du -sh "$APP_PATH" | cut -f1)"
        mkdir -p build/Payload
        cp -r "$APP_PATH" build/Payload/
        cd build
        zip -r Jellyflix-unsigned.ipa Payload
        rm -rf Payload
        ls -lh Jellyflix-unsigned.ipa

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Jellyflix-unsigned-ipa
        path: build/Jellyflix-unsigned.ipa
        retention-days: 30
