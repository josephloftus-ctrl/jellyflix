name: Build tvOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Select Xcode version
      run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

    - name: Show Xcode version
      run: xcodebuild -version

    - name: Install tvOS platform
      run: |
        # Try multiple times — runner state varies
        sudo xcodebuild -runFirstLaunch 2>/dev/null || true
        for i in 1 2 3; do
          echo "Attempt $i to download tvOS platform..."
          if sudo xcodebuild -downloadPlatform tvOS; then
            echo "tvOS platform installed successfully"
            break
          fi
          echo "Attempt $i failed, retrying in 5s..."
          sleep 5
        done
        # Verify
        xcodebuild -showsdks | grep -i tv || echo "WARNING: tvOS SDK not found"

    - name: Resolve Swift packages
      run: |
        xcodebuild -resolvePackageDependencies \
          -project Stingray.xcodeproj \
          -scheme Stingray

    - name: Build Archive (Unsigned)
      run: |
        set -o pipefail
        xcodebuild archive \
          -project Stingray.xcodeproj \
          -scheme Stingray \
          -archivePath build/Jellyflix.xcarchive \
          -destination 'generic/platform=tvOS' \
          -configuration Release \
          -skipPackagePluginValidation \
          SWIFT_VERSION=5 \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          DEVELOPMENT_TEAM="" \
          PROVISIONING_PROFILE_SPECIFIER="" \
          2>&1 | tee build.log

    - name: Show build errors
      if: failure()
      run: |
        echo "=== BUILD ERRORS ==="
        grep -E "error:" build.log | head -50 || echo "No errors found in log"
        echo "=== END ERRORS ==="

    - name: Create Unsigned IPA
      run: |
        APP_PATH=$(find build/Jellyflix.xcarchive -name "*.app" -not -name "TopShelf*" | head -1)
        echo "Using app: $APP_PATH"
        if [ -z "$APP_PATH" ]; then
          echo "ERROR: No .app found in archive"
          find build/Jellyflix.xcarchive -type d | head -20
          exit 1
        fi
        echo "App size: $(du -sh "$APP_PATH" | cut -f1)"
        ls -la "$APP_PATH/"
        mkdir -p build/Payload
        cp -r "$APP_PATH" build/Payload/
        cd build
        zip -r Jellyflix-unsigned.ipa Payload
        rm -rf Payload
        ls -lh Jellyflix-unsigned.ipa

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Jellyflix-unsigned-ipa
        path: build/Jellyflix-unsigned.ipa
        retention-days: 30
